<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Chiara & Gregorio</title>
<style>
body{
margin:0;
font-family:'Georgia', serif;
overflow:hidden;
text-align:center;
background: url('https://cdn.pixabay.com/photo/2017/12/03/18/21/villa-2997905_1280.jpg') no-repeat center center fixed;
background-size: cover;
}

/* Busta */
#envelope{
position:absolute;
top:100%;
left:100%;
transform:translate(-80%,-80%);
width:380px;
height:250px;
background:#f8f6f0;
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition: all 1s ease;
z-index:10;
}
#seal{
width:90px;
height:90px;
background:#f4a261;
border-radius:80%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
font-size:28px;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

/* Invito */
#invito{
display:none;
padding:50px;
background: rgba(255,255,255,0.85);
border-radius:15px;
margin:50px auto;
width:80%;
max-width:700px;
z-index:5;
}
h1{ font-size:50px; color:#7a4b3a; margin:0; }
h2{ font-weight:normal; color:#a67c52; margin:5px 0 20px 0; }
p{ font-size:20px; line-height:1.6; }

/* Petali */
.petal{
position:fixed;
top:-20px;
width:12px;
height:12px;
border-radius:50%;
opacity:0.85;
background:#f4a261;
animation:fall linear infinite;
}
@keyframes fall{
0%{top:-20px;}
100%{top:110vh;}
}

/* Uccellini */
.bird{
position:fixed;
width:40px;
height:40px;
background: url('https://cdn.pixabay.com/photo/2017/01/31/18/19/bird-2022607_1280.png') no-repeat;
background-size:contain;
animation:fly linear infinite;
}
@keyframes fly{ 0%{left:-50px;} 100%{left:110vw;} }

/* RSVP */
#rsvp{
margin-top:30px;
padding:20px;
display:none;
}
#rsvp input, #rsvp textarea{
width:80%;
padding:10px;
margin:5px 0;
border-radius:5px;
}
#rsvp button{
padding:10px 20px;
background:#f4a261;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* Countdown */
#countdown{ font-size:20px; margin-top:10px; color:#7a4b3a; }
</style>
</head>
<body>

<!-- Busta -->
<div id="envelope" onclick="openInvite()"><div id="seal">C&G</div></div>

<!-- Musica -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8a0c6a9c4.mp3" type="audio/mpeg">
</audio>

<!-- Invito -->
<div id="invito">
<h1>Chiara Vincenzi</h1>
<h2>&</h2>
<h1>Gregorio Tronchin</h1>
<p>3 Ottobre 2026, Ore 11:00</p>
<p>Chiesa Parrocchiale dei Santi Gervasio e Protasio Martiri</p>
<p>Villa Luppis, Pordenone</p>
<div id="countdown"></div>

<div id="rsvp">
<h2>Conferma presenza</h2>
<input type="text" id="nome" placeholder="Nome e Cognome">
<input type="text" id="partecipanti" placeholder="Numero persone">
<textarea id="allergie" placeholder="Segnala allergie"></textarea>
<button onclick="submitRSVP()">Invia</button>
<p id="thanks"></p>
</div>
</div>

<!-- Uccellini -->
<div class="bird" style="top:20%; animation-duration:25s;"></div>
<div class="bird" style="top:50%; animation-duration:30s;"></div>

<script>
function openInvite(){
document.getElementById("envelope").style.display="none";
document.getElementById("invito").style.display="block";
document.getElementById("rsvp").style.display="block";
document.getElementById("music").play();
createPetals();
startCountdown();
}
function createPetals(){
for(let i=0;i<50;i++){
let p=document.createElement("div");
p.className="petal";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(p);
}
}
function submitRSVP(){
let n=document.getElementById("nome").value;
let np=document.getElementById("partecipanti").value;
let a=document.getElementById("allergie").value;
if(n && np){
document.getElementById("thanks").innerText="Grazie "+n+"! Conferma ricevuta.";
document.getElementById("rsvp").style.display="none";
console.log({n,np,a});
} else alert("Inserisci nome e numero di persone");
}
function startCountdown(){
let countDate=new Date("Oct 3, 2026 11:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let d=countDate-now;
let days=Math.floor(d/(1000*60*60*24));
let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((d%(1000*60*60))/(1000*60));
let s=Math.floor((d%(1000*60))/1000);
document.getElementById("countdown").innerText=`Manca ${days} giorni ${h} ore ${m} minuti ${s} secondi`;
},1000);
}
</script>
</body>
</html>
